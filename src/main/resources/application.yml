spring:
  application:
    name: confluence-rag-ingestor
  ai:
    vectorstore:
      chroma:
        client:
          host: http://localhost
          port: 8000
        initialize-schema: true
        collection-name: ${confluence.ingestor.chroma-collection-name}
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text
      chat:
        options:
          model: ${confluence.ingestor.ui-default-llm-model:llama3.2}
      init:
        pull-model-strategy: never
        chat:
          include: false
  kafka:
    bootstrap-servers: ${confluence.ingestor.kafka.bootstrap-servers:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

server:
  port: 8080

logging:
  level:
    root: INFO
    com.confluence.ingestor: INFO
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  file:
    name: logs/app.log

app:
  attachment-analysis:
    enabled: true
    vision-enabled: false
    vision-model: qwen3-vl:8b
    ollama-base-url: http://localhost:11434
    timeout: 30s
    max-file-size-mb: 20
    schema-version: 1

confluence:
  ingestor:
    data-directory: data
    default-batch-size: 100
    default-concurrency: 1
    default-request-timeout-seconds: 60
    verify-ssl: false
    manifest-version: 1
    retry-skip-threshold: 2
    allowed-image-extensions:
      - png
      - jpg
      - jpeg
      - gif
      - svg
      - webp
      - bmp
    allowed-drawio-extensions:
      - drawio
      - xml
    max-chunk-characters: 4000
    vector-ingest-enabled: true
    chroma-collection-name: confluence-rag
    query-enabled: true
    default-query-top-k: 5
    default-similarity-threshold: 0.0
    per-page-state-enabled: false
    async-core-pool-size: 1
    async-max-pool-size: 2
    ui-config-file: data/ui-config.json
    ui-default-llm-model: llama3.2
    kafka:
      enabled: false
      bootstrap-servers: localhost:9092
      consumer-group-id: confluence-ingestor
      manifest-crawl-topic: ingestion.manifest.crawl
      page-transform-topic: ingestion.page.transform
      chunk-topic: ingestion.page.chunk
      vector-ingest-topic: ingestion.page.vector

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
